server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: activity-center
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:13306}/${DB_NAME:nbys-activity-manager}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

apollo:
  bootstrap:
    enabled: true
    eagerLoad:
      enabled: true
    namespaces: application
  meta: ${APOLLO_META:http://localhost:8080}

app:
  upload-dir: ${UPLOAD_DIR:uploads}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
