{% extends "base.html" %}
{% block content %}
<section class="auth-card wide">
  <h1>用户设置</h1>
  <p class="muted">可以修改自己的呼号和密码。用户名不可修改。</p>
  <form method="post" class="form-stack">
    <label>用户名<input value="{{ current_user.username }}" disabled></label>
    <label>呼号<input name="callsign" value="{{ current_user.callsign }}" required></label>
    <hr class="soft-line">
    <p class="muted small-text">不修改密码时，下面三个密码框可以留空。</p>
    <label>当前密码<input type="password" name="current_password" autocomplete="current-password"></label>
    <label>新密码<input type="password" name="new_password" autocomplete="new-password" minlength="6"></label>
    <label>再次确认新密码<input type="password" name="new_password2" autocomplete="new-password" minlength="6"></label>
    <div class="form-actions">
      <a class="button secondary" href="{{ url_for('dashboard') }}">返回</a>
      <button class="primary" type="submit">保存设置</button>
    </div>
  </form>
</section>
{% endblock %}
